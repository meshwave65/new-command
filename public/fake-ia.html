<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de IA</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }
        h1 {
            font-weight: 300;
            text-align: center;
            color: #aaa;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #007acc;
        }
    </style>
</head>
<body>
    <h1>Simulador de IA</h1>
    <textarea id="ia-prompt-textarea" placeholder="O texto otimizado e injetado pelo SOFIA Command Center aparecerá aqui..."></textarea>
</body>
</html>
